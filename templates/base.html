<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Animal - Tienda & Comunidad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #f7f9fa; }
        h1, h2, h3, .navbar-brand { font-family: 'Fredoka One', cursive; }
        .card { transition: transform 0.2s; border-radius: 16px; overflow: hidden; }
        .card:hover { transform: translateY(-4px); }
        .product-img { height: 200px; object-fit: cover; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand text-warning fs-3" href="#">🐱🐶🐰🦜 Molly Pett</a>
            <div class="navbar-nav gap-2">
                <a class="btn btn-outline-warning text-white border-0" href="{{ url_for('tienda') }}">🏪 Catálogo Visual</a>
                <a class="btn btn-outline-warning text-white border-0" href="{{ url_for('foro') }}">📢 Foro Comunitario</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4 mb-5">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
