<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molly Pet - Tienda & Comunidad</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #f7f9fa; }
        h1, h2, h3, .navbar-brand { font-family: 'Fredoka One', cursive; }
        .card { transition: transform 0.2s; border-radius: 16px; overflow: hidden; }
        .card:hover { transform: translateY(-4px); }
        .product-img { height: 200px; object-fit: cover; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand text-warning fs-3 d-inline-flex align-items-center gap-2" href="{{ url_for('home') }}" style="font-weight: 800; letter-spacing: -0.5px;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="42" height="42" style="transform: translateY(-1px);">
                    <path d="M25,35 C15,40 12,65 22,75 C28,82 35,65 32,50 Z" fill="#8B5A2B"/>
                    <path d="M75,35 C85,40 88,65 78,75 C72,82 65,65 68,50 Z" fill="#8B5A2B"/>
                    <ellipse cx="50" cy="52" rx="26" ry="24" fill="#FFFFFF"/>
                    <path d="M32,40 C32,30 40,28 50,34 C60,28 68,30 68,40 C68,50 62,52 50,52 C38,52 32,50 32,40 Z" fill="#CD853F"/>
                    <path d="M46,31 C48,28 52,28 54,31 L52,48 L48,48 Z" fill="#FFFFFF"/>
                    <circle cx="40" cy="45" r="4" fill="#2B1A0A"/>
                    <circle cx="60" cy="45" r="4" fill="#2B1A0A"/>
                    <circle cx="38.5" cy="43.5" r="1.2" fill="#FFFFFF"/>
                    <circle cx="58.5" cy="43.5" r="1.2" fill="#FFFFFF"/>
                    <ellipse cx="50" cy="60" rx="14" ry="11" fill="#FFFFFF"/>
                    <path d="M44,56 C44,53 56,53 56,56 C56,60 52,62 50,62 C48,62 44,60 44,56 Z" fill="#1A1A1A"/>
                    <path d="M47,67 C47,67 47,73 50,73 C53,73 53,67 53,67 Z" fill="#FF6B81"/>
                    <path d="M44,62 Q50,68 56,62" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
                    <path d="M30,73 Q50,82 70,73 Q68,78 50,84 Q32,78 30,73 Z" fill="#E63946"/>
                    <circle cx="50" cy="81" r="4.5" fill="#FFD700"/>
                    </svg>
                    <span>Molly Pet</span>
                    </a>
            <div class="navbar-nav gap-2">
                <a class="btn btn-outline-warning text-white border-0" href="{{ url_for('tienda') }}">🏪 Catálogo Visual</a>
                <a class="btn btn-outline-warning text-white border-0" href="{{ url_for('foro') }}">📢 Foro Comunitario</a>
                <a class="btn btn-warning text-dark fw-bold position-relative" href="{{ url_for('ver_carrito') }}">
                🛒 Mi Carrito 
                </a>
            </div>
        </div>
    </nav>
    <div class="container mt-4 mb-5">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
