<form action="{{ url_for('agregar_al_carrito') }}" method="POST">
    <input type="hidden" name="id_producto" value="{{ item[0] }}">
    <input type="hidden" name="nombre" value="{{ item[1] }}">
    <input type="hidden" name="precio" value="{{ item[3] }}">

    {% if item[4] == 'mercaderia' %}
        <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Seleccionar Variante / Color:</label>
            <select name="detalle" class="form-select rounded-3">
                <option value="Rojo / Chico">🔴 Color Rojo / Estándar</option>
                <option value="Azul / Mediano">🔵 Color Azul / Mediano</option>
                <option value="Verde / Grande">🟢 Color Verde / Grande</option>
            </select>
        </div>
    {% elif item[4] == 'chapita' %}
        <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Nombre y Teléfono a Grabar:</label>
            <input type="text" name="detalle" class="form-control rounded-3" placeholder="Ej: 'Firu' - 3624XXXXXX" required>
        </div>
    {% elif item[4] == 'servicio' %}
        <div class="mb-2">
            <label class="form-label small fw-bold text-muted">Día (Lunes a Viernes):</label>
            <input type="date" name="fecha_turno" class="form-control rounded-3 date-picker-check" required>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Horario Comercial:</label>
            <select name="horario_turno" class="form-select rounded-3" required>
                <option value="09:00 AM">09:00 AM</option>
                <option value="11:00 AM">11:00 AM</option>
                <option value="18:00 PM">06:00 PM (18hs)</option>
                <option value="20:00 PM">08:00 PM (20hs)</option>
            </select>
        </div>
    {% endif %}
    
    <button type="submit" class="btn btn-warning w-100 py-2 rounded-3 mt-2 fw-bold text-dark">
        🛒 Agregar al Carrito
    </button>
</form>
